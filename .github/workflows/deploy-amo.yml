name: Deploy to AMO

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate version matches tag
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          TAG_VERSION="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ manifest.json version ($MANIFEST_VERSION) does not match release tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✅ Version $MANIFEST_VERSION matches tag"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build extension (production)
        run: bun run build:prod

      - name: Package extension
        run: |
          mkdir -p dist-package
          cp dist/background.js dist/content.js dist/popup.js dist-package/ 2>/dev/null || true
          cp manifest.json popup.html dist-package/
          cp -r icons/ dist-package/
          sed -i 's|"dist/background\.js"|"background.js"|g; s|"dist/content\.js"|"content.js"|g' dist-package/manifest.json
          sed -i 's|src="dist/popup.js"|src="popup.js"|g' dist-package/popup.html
          cd dist-package && zip -r ../auto-refresh-${{ github.event.release.tag_name }}.zip .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: auto-refresh-${{ github.event.release.tag_name }}.zip

      - name: Sign and upload to AMO
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          bunx web-ext sign \
            --source-dir dist-package \
            --artifacts-dir amo-artifacts \
            --api-key "$AMO_API_KEY" \
            --api-secret "$AMO_API_SECRET" \
            --channel listed