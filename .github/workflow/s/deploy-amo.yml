name: Deploy to AMO

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build extension (production)
        run: bun run build:prod

      - name: Package extension (correct structure)
        run: |
          # Create zip with ALL files at root level
          # manifest.json, popup.html, dist/, icons/, fonts/ must be at zip root
          cd ${{ github.workspace }}
          
          # Verify files exist
          echo "=== Checking files ==="
          ls -la manifest.json popup.html
          ls dist/ icons/ fonts/
          
          # Create zip - files will be at root
          zip -r auto-refresh-${{ github.event.release.tag_name }}.zip \
            manifest.json \
            popup.html \
            dist \
            icons \
            fonts
          
          # Verify zip structure
          echo "=== Zip contents (manifest.json should be at root) ==="
          unzip -l auto-refresh-${{ github.event.release.tag_name }}.zip | grep -E "^ [^/]*/|manifest.json"

      - name: Sign and upload to AMO
        if: ${{ secrets.AMO_API_KEY != '' && secrets.AMO_API_SECRET != '' }}
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          bunx web-ext sign \
            --source-file auto-refresh-${{ github.event.release.tag_name }}.zip \
            --artifacts-dir amo-artifacts \
            --api-key "$AMO_API_KEY" \
            --api-secret "$AMO_API_SECRET" \
            --channel listed

      - name: Manual upload reminder
        if: ${{ secrets.AMO_API_KEY == '' || secrets.AMO_API_SECRET == '' }}
        run: |
          echo "::warning::AMO_API_KEY or AMO_API_SECRET not set. Please upload manually to AMO."
          echo "1. Download the zip from the release assets"
          echo "2. Go to https://addons.mozilla.org/en-US/developers/addon/submit/"
          echo "3. Upload the zip file manually"
          echo "4. After approval, add your extension ID to manifest.json"
          echo "5. Add AMO_API_KEY and AMO_API_SECRET to GitHub secrets"
