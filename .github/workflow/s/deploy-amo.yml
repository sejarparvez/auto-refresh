name: Deploy to AMO

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build extension (production)
        run: bun run build:prod

      - name: Package extension
        run: |
          mkdir -p dist-package
          cp -r dist/* dist-package/
          cp manifest.json popup.html dist-package/
          cp -r icons/ fonts/ dist-package/
          cd dist-package && zip -r ../auto-refresh-${{ github.event.release.tag_name }}.zip .

      - name: Sign and upload to AMO
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          bunx web-ext sign \
            --source-dir dist-package \
            --artifacts-dir amo-artifacts \
            --api-key "$AMO_API_KEY" \
            --api-secret "$AMO_API_SECRET" \
            --channel listed
