name: Deploy to AMO

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build extension (production)
        run: bun run build:prod

      - name: Create extension zip (manifest.json at root)
        run: |
          # Create zip with ALL files at root level
          # manifest.json, popup.html, dist/*, icons/*, fonts/* must be at zip root
          cd ${{ github.workspace }}
          
          # List files to include
          echo "=== Files to zip ==="
          ls -la manifest.json popup.html
          ls dist/ icons/ fonts/Geist/
          
          # Create zip - files will be at root
          zip -r auto-refresh-${{ github.event.release.tag_name }}.zip \
            manifest.json \
            popup.html \
            dist/background.js \
            dist/popup.js \
            dist/content.js \
            icons/icon-16.png \
            icons/icon-32.png \
            icons/icon-48.png \
            icons/icon-100.png \
            fonts/Geist/Geist-VariableFont_wght.ttf

      - name: Verify zip structure
        run: |
          echo "=== Zip contents (manifest.json must be at root) ==="
          unzip -l auto-refresh-${{ github.event.release.tag_name }}.zip | head -20

      - name: Instructions for first-time submission
        run: |
          echo "::notice::For FIRST submission to AMO, manual upload is required."
          echo "1. Download the zip from the release assets below"
          echo "2. Go to https://addons.mozilla.org/en-US/developers/addon/submit/"
          echo "3. Upload the zip file manually"
          echo "4. After AMO assigns an ID, add it to manifest.json"
          echo "5. Add AMO_API_KEY and AMO_API_SECRET to GitHub secrets"
          echo "6. Future releases will auto-deploy"
